name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check src/ tests/ scripts/

      - name: Test
        run: pytest -q

  smoke:
    # Spin up a real PostgreSQL+PostGIS, run all migrations against it,
    # boot the FastAPI app and probe /api/health. Catches schema breaks
    # and lifespan regressions that the unit suite (mocked DB) cannot.
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: aidra
          POSTGRES_PASSWORD: aidra
          POSTGRES_DB: aidra
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aidra -d aidra"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql+asyncpg://aidra:aidra@localhost:5432/aidra
      MODELS_DIR: /tmp/aidra/models
      IMAGES_DIR: /tmp/aidra/images
      THUMBNAILS_DIR: /tmp/aidra/thumbnails
      PROMETHEUS_ENABLED: "false"
      LOKI_URL: ""
      SCHEDULER_ENABLED: "false"
      DEFAULT_MODEL: yolov8n
      AIDRA_API_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev libproj-dev libspatialindex-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install uvicorn

      - name: Prepare runtime dirs
        run: mkdir -p /tmp/aidra/models /tmp/aidra/images /tmp/aidra/thumbnails

      - name: Run database migrations
        run: |
          python - <<'PY'
          import asyncio
          from pathlib import Path

          from src.config import Settings
          from src.db.connection import db


          async def main() -> None:
              await db.connect(Settings())
              await db.run_migrations(Path("src/db/migrations"))
              await db.disconnect()


          asyncio.run(main())
          PY

      - name: Boot API and probe /api/health
        run: |
          set -e
          # The lifespan tries to download Copernicus credentials; we
          # disable the scheduler and pass empty credentials so startup
          # only needs the DB. The engine will be None (no models),
          # which is acceptable: /api/health reports the DB connection
          # and lets us assert the schema migrated cleanly.
          python -m uvicorn src.main:app --host 127.0.0.1 --port 8000 \
            > uvicorn.log 2>&1 &
          UVICORN_PID=$!
          echo "uvicorn pid=$UVICORN_PID"

          # Poll up to 30 s for /api/health to return 200.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health > /tmp/health.json 2>/dev/null; then
              echo "health response:"
              cat /tmp/health.json
              # Assert "db":"connected" is present — the only contract
              # we genuinely care about for the schema-smoke.
              python -c "import json,sys; d=json.load(open('/tmp/health.json')); sys.exit(0 if d.get('db')=='connected' else 1)"
              kill $UVICORN_PID || true
              exit 0
            fi
            sleep 1
          done

          echo "FAILED: /api/health never returned 200" >&2
          echo "--- uvicorn.log tail ---"
          tail -100 uvicorn.log || true
          kill $UVICORN_PID || true
          exit 1
